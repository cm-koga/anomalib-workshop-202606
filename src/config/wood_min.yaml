data:
  class_path: anomalib.data.Folder
  init_args:
    name: "wood_min"
    root: "../data/wood"
    normal_dir: "train/OK_14"
    abnormal_dir: "test_min"
    normal_test_dir: "test/OK"
    mask_dir: "test_min_gt"
    extensions: [".png", ".jpg", ".jpeg", ".bmp"]

    train_batch_size: 32
    eval_batch_size: 32
    num_workers: 0
    test_split_mode: from_dir
    val_split_mode: from_test
    val_split_ratio: 0.2
    seed: 777